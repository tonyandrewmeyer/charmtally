repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: check-json
        exclude: ^(results|scored|snapshots/.*)\.json$
      - id: check-added-large-files
        args: [--maxkb=500]
        exclude: ^(dashboard\.html|trend\.html|results\.json|scored\.json|snapshots/.*\.json)$
      - id: end-of-file-fixer
        exclude: ^(dashboard\.html|trend\.html|results\.json|scored\.json|snapshots/.*\.json)$
      - id: trailing-whitespace
        exclude: ^(dashboard\.html|trend\.html|results\.json|scored\.json|snapshots/.*\.json)$

  - repo: local
    hooks:
      - id: ruff
        name: ruff (lint)
        entry: uv run ruff check --fix --force-exclude
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: ruff-format
        name: ruff (format)
        entry: uv run ruff format --force-exclude
        language: system
        types_or: [python, pyi]
        require_serial: true

      - id: codespell
        name: codespell
        entry: uv run codespell
        language: system
        types: [text]
        exclude: ^(dashboard\.html|trend\.html|results\.json|scored\.json|snapshots/.*\.json|uv\.lock)$
