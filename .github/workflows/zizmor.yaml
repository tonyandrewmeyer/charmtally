name: zizmor

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - ".github/workflows/**"
      - ".github/zizmor.yaml"

permissions:
  contents: read

jobs:
  zizmor:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa  # v0.5.7
