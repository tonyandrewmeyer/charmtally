name: zizmor

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - ".github/workflows/**"
      - ".github/zizmor.yml"

permissions:
  contents: read

jobs:
  zizmor:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d  # v0.5.6
