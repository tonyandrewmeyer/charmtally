# Weekly corpus scan workflow
#
# What it does:
#   - Cron: 02:00 UTC every Monday (cheap; data moves slowly).
#   - workflow_dispatch: run on demand from the GH UI.
#   - Caches /tmp/charm-workdir between runs so we don't re-clone ~340
#     charms each scan. The corpus CSV itself is fetched fresh from
#     canonical/hyrum on every run (the upstream source); cache key
#     hashes corpus-overrides.yaml only (per-row pins are the only
#     locally-controlled axis).
#   - Runs the full pipeline: scan -> score -> dashboard.
#   - Writes a dated snapshot to snapshots/scored-YYYY-MM-DD.json for
#     the trend code.
#   - Commits the refreshed artefacts back to main if any changed.

name: scan

on:
  schedule:
    - cron: "0 2 * * 1"   # Mondays 02:00 UTC
  workflow_dispatch:       # manual trigger from the GitHub UI
    inputs:
      llm_score:
        description: "Run the LLM scoring pass after rule-based scoring (uses OPENROUTER_API_KEY)"
        type: boolean
        default: false

# Single in-flight scan; queue any extras.
concurrency:
  group: scan
  cancel-in-progress: false

permissions:
  contents: write          # need to commit the refreshed artefacts

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45    # cold-cache run takes ~30min; warm cache ~10min

    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true

      # Persist the charm clone tree across runs. Cache key is the
      # overrides hash — the corpus CSV is fetched fresh from
      # canonical/hyrum on every run and lives at workdir/corpus.csv
      # (re-clones are bounded by the per-row diff anyway).
      - name: Cache charm workdir
        uses: actions/cache@v6.1.0
        with:
          path: /tmp/charm-workdir
          key: charm-workdir-${{ hashFiles('corpus-overrides.yaml') }}-${{ github.run_number }}
          restore-keys: |
            charm-workdir-${{ hashFiles('corpus-overrides.yaml') }}-
            charm-workdir-

      - name: Scan corpus
        run: |
          uv run --with pyyaml charmtally scan \
            --workdir /tmp/charm-workdir \
            --overrides corpus-overrides.yaml \
            --out results.json

      - name: Score
        run: |
          uv run --with pyyaml charmtally score \
            results.json \
            --overrides corpus-overrides.yaml \
            --out scored.json

      - name: LLM scoring pass
        if: ${{ inputs.llm_score == true }}
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          uv run --with pyyaml charmtally llm-score \
            scored.json \
            --workdir /tmp/charm-workdir \
            --cache-dir /tmp/charm-workdir/.llm-verdicts \
            --out llm-scored.json

      - name: Render dashboard
        run: |
          SCORED=scored.json
          if [ -f llm-scored.json ]; then SCORED=llm-scored.json; fi
          uv run --with pyyaml charmtally dashboard \
            "$SCORED" --out dashboard.html

      - name: Write dated snapshot
        run: |
          mkdir -p snapshots
          SCORED=scored.json
          if [ -f llm-scored.json ]; then SCORED=llm-scored.json; fi
          cp "$SCORED" "snapshots/scored-$(date -u +%Y-%m-%d).json"

      - name: Commit refreshed artefacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          git config user.name  "charmtally-bot"
          git config user.email "charmtally-bot@aotearoa.dev"
          git add results.json scored.json dashboard.html snapshots/
          [ -f llm-scored.json ] && git add llm-scored.json || true
          if git diff --cached --quiet; then
            echo "no changes to commit"
            exit 0
          fi
          git commit -m "scan: weekly corpus refresh $(date -u +%Y-%m-%d)"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GH_REPO}.git" HEAD:main
